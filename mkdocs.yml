site_name: LetsFG
site_url: https://docs.letsfg.co
site_description: Agent-native flight search & booking API. 400+ airlines, straight from the terminal.
site_author: LFG

repo_url: https://github.com/LetsFG/LetsFG

theme:
  name: material
  custom_dir: docs/overrides
  favicon: assets/favicon.png
  logo: assets/favicon.png
  palette:
    - scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Lexend
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting started:
    - Quickstart: getting-started.md
    - API Guide: api-guide.md
    - Tutorials: tutorials.md
  - Architecture:
    - Architecture & Resilience: architecture-guide.md
  - Integrations:
    - AI Agent Guide: agent-guide.md
    - Packages & SDKs: packages.md
  - Reference:
    - CLI Reference: cli-reference.md
    - OpenAPI Spec: openapi.md

extra:
  generator: false

extra_css:
  - assets/extra.css

copyright: ""

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
